<!DOCTYPE html>
<html lang="sv">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex, nofollow">
<title>Fokus v2</title>
<style>
  :root {
    --bg: #1C1C1C;
    --fg: #EEEAE0;
    --fg-dim: #8A857B;
    --fg-faint: #4A473F;
    --magenta: #E63B8B;
    --yellow-green: #C6D645;
    --line: #2D2D2D;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body {
    background: var(--bg); color: var(--fg);
    font-family: "Trebuchet MS", sans-serif;
    min-height: 100vh; line-height: 1.5;
    -webkit-font-smoothing: antialiased;
  }
  body {
    padding: 32px 24px 80px;
    max-width: 560px;
    margin: 0 auto;
  }

  .meta {
    color: var(--fg-dim); font-size: 14px;
    margin-bottom: 36px; letter-spacing: 0.02em;
  }

  section { margin-bottom: 32px; }
  section h2 {
    color: var(--fg-dim); font-size: 12px;
    letter-spacing: 0.18em; text-transform: uppercase;
    font-weight: normal; margin-bottom: 14px;
  }
  section ul { list-style: none; }
  section li {
    padding: 5px 0; font-size: 17px; color: var(--fg);
    line-height: 1.45;
  }
  section li .time {
    color: var(--fg-dim); font-variant-numeric: tabular-nums;
    margin-right: 14px; display: inline-block; min-width: 64px;
  }
  section li.sub { padding-left: 20px; color: var(--fg-dim); }

  .primary { margin-bottom: 44px; }
  .primary .label {
    color: var(--magenta); font-size: 12px;
    letter-spacing: 0.18em; text-transform: uppercase;
    margin-bottom: 18px;
  }
  .primary .label::after {
    content: ""; display: block; width: 48px; height: 1px;
    background: var(--magenta); margin-top: 10px;
  }
  .primary .text { font-size: 26px; line-height: 1.3; color: var(--fg); }
  .primary .placeholder {
    color: var(--fg-faint); font-style: italic; font-size: 18px;
  }

  .reminder { margin-top: 40px; }
  .reminder .text {
    color: var(--fg-dim); font-size: 16px; font-style: italic;
    line-height: 1.55; border-left: 2px solid var(--fg-faint);
    padding-left: 16px;
  }

  .empty {
    color: var(--fg-faint); font-style: italic; font-size: 14px;
    padding: 4px 0;
  }

  .footer {
    margin-top: 64px; padding-top: 16px;
    border-top: 1px solid var(--line);
    color: var(--fg-faint); font-size: 12px; line-height: 1.5;
  }

  a { color: inherit; text-decoration: none; }
  a:hover { text-decoration: underline; opacity: 0.85; }
</style>
</head>
<body>

<div id="app"><p class="empty">Laddar...</p></div>

<script>
async function load() {
  try {
    const res = await fetch('data.json?t=' + Date.now());
    if (!res.ok) throw new Error('HTTP ' + res.status);
    const data = await res.json();
    render(data);
  } catch (e) {
    document.getElementById('app').innerHTML =
      '<p class="empty">Kunde inte ladda data: ' + escapeHtml(e.message) + '</p>';
  }
}

function escapeHtml(s) {
  return String(s == null ? '' : s)
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;');
}

function fmtDate(iso) {
  const d = new Date(iso);
  return d.toLocaleDateString('sv-SE', { weekday: 'short', day: 'numeric', month: 'short' });
}

function fmtTime(iso) {
  const d = new Date(iso);
  return d.toLocaleTimeString('sv-SE', { hour: '2-digit', minute: '2-digit' });
}

function dayPart(now) {
  const h = now.getHours();
  if (h < 12) return 'morgon';
  if (h < 17) return 'dag';
  if (h < 22) return 'kväll';
  return 'natt';
}

function selectNowLine(nowLines, now) {
  // Fas 2 fyller nowLines med 3 prosa-rader (morgon/dag/kväll). Fas 3 väljer per dagdel.
  // Fas 1: returnera första om någon finns.
  if (!Array.isArray(nowLines) || nowLines.length === 0) return null;
  const part = dayPart(now);
  const byPart = nowLines.find(l => l && l.dayPart === part);
  if (byPart) return byPart.text;
  return typeof nowLines[0] === 'string' ? nowLines[0] : nowLines[0].text;
}

function render(data) {
  const now = new Date();
  const html = [];
  const E = escapeHtml;

  // Metarad
  const dateLabel = now.toLocaleDateString('sv-SE', {
    weekday: 'long', day: 'numeric', month: 'long'
  });
  const sleepBit = data.sleep ? ' · sov ' + E(data.sleep.label) : '';
  html.push('<div class="meta">' + E(dateLabel) + ' · ' + E(dayPart(now)) + sleepBit + '</div>');

  // "Det viktigaste nu" — Fas 2 fyller, Fas 1 visar placeholder
  const nowLine = selectNowLine(data.nowLines, now);
  html.push('<section class="primary"><div class="label">Det viktigaste nu</div>');
  if (nowLine) {
    html.push('<div class="text">' + E(nowLine) + '</div>');
  } else {
    html.push('<div class="placeholder">[Claude fyller i denna i Fas 2]</div>');
  }
  html.push('</section>');

  // Two-todo override (om finns)
  if (data.twoTodoOverride && data.twoTodoOverride.length) {
    html.push('<section><h2>Two-todo</h2><ul>');
    for (const t of data.twoTodoOverride) {
      html.push('<li>' + E(t.text) + '</li>');
    }
    html.push('</ul></section>');
  }

  // Today events
  html.push('<section><h2>Idag</h2>');
  if (data.todayEvents && data.todayEvents.length) {
    html.push('<ul>');
    for (const e of data.todayEvents) {
      const t = e.isAllDay ? 'heldag' : E(e.time);
      html.push('<li><span class="time">' + t + '</span>' + E(e.title) + '</li>');
    }
    html.push('</ul>');
  } else {
    html.push('<p class="empty">Inga events idag.</p>');
  }
  html.push('</section>');

  // Today items
  if (data.todayItems && data.todayItems.length) {
    html.push('<section><h2>Att göra idag</h2><ul>');
    for (const t of data.todayItems) {
      html.push('<li>' + E(t.text) + '</li>');
    }
    html.push('</ul></section>');
  }

  // Open loops (behöver landa)
  if (data.openLoops && data.openLoops.length) {
    html.push('<section><h2>Behöver landa</h2><ul>');
    for (const t of data.openLoops) {
      html.push('<li>' + E(t) + '</li>');
    }
    html.push('</ul></section>');
  }

  // Week ahead
  if (data.weekAhead && data.weekAhead.length) {
    html.push('<section><h2>Veckan framåt</h2><ul>');
    for (const w of data.weekAhead) {
      html.push('<li><span class="time">' + E(fmtDate(w.date)) + '</span>' + E(w.title) + '</li>');
    }
    html.push('</ul></section>');
  }

  // Next week prep
  if (data.nextWeekPrep && data.nextWeekPrep.length) {
    html.push('<section><h2>Nästa vecka, förbered nu</h2><ul>');
    for (const w of data.nextWeekPrep) {
      html.push('<li><span class="time">' + E(fmtDate(w.date)) + '</span>' + E(w.title) + '</li>');
    }
    html.push('</ul></section>');
  }

  // Important mail
  if (data.importantMail && data.importantMail.length) {
    html.push('<section><h2>Viktiga mail</h2><ul>');
    for (const m of data.importantMail) {
      const from = (m.from || '').replace(/<.*>/, '').trim();
      html.push('<li>' + E(from) + ' — ' + E(m.subject) + '</li>');
    }
    html.push('</ul></section>');
  }

  // Reminder placeholder (Fas 2 fyller)
  if (data.reminder) {
    html.push('<section class="reminder"><h2>Påminnelse</h2><div class="text">' + E(data.reminder) + '</div></section>');
  }

  // Footer
  const generatedLabel = new Date(data.meta.generatedAt).toLocaleString('sv-SE');
  html.push('<div class="footer">');
  html.push('Fokus v2 · Fas 1 (struktur, ingen prosa) · genererad ' + E(generatedLabel));
  html.push('</div>');

  document.getElementById('app').innerHTML = html.join('');
}

load();
</script>
</body>
</html>
